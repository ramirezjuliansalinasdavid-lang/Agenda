<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agenda Inteligente | Calendario interactivo</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234285f4'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='white' font-family='Arial'%3E📅%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" sizes="180x180"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234285f4'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='white' font-family='Arial'%3E📅%3C/text%3E%3C/svg%3E">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calendar-alt"></i>
                <h2>AgendaPro</h2>
            </div>

            <button id="btnAgregarEvento" class="btn-primary">
                <i class="fas fa-plus"></i> Nuevo evento
            </button>

            <div class="vistas">
                <h3>Vistas</h3>
                <div class="vista-buttons">
                    <button data-vista="mes" class="vista-btn active"><i class="fas fa-calendar-week"></i> Mes</button>
                    <button data-vista="semana" class="vista-btn"><i class="fas fa-calendar-week"></i> Semana</button>
                    <button data-vista="dia" class="vista-btn"><i class="fas fa-calendar-day"></i> Día</button>
                </div>
            </div>

            <div class="filtros">
                <h3>Filtrar por tipo</h3>
                <select id="filtroTipo">
                    <option value="todos">Todos</option>
                    <option value="trabajo">💼 Trabajo</option>
                    <option value="personal">🏠 Personal</option>
                    <option value="reunion">👥 Reunión</option>
                    <option value="recordatorio">⏰ Recordatorio</option>
                </select>
            </div>

            <div class="theme-toggle">
                <i class="fas fa-sun"></i>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
                <i class="fas fa-moon"></i>
            </div>
        </aside>

        <main class="main-content">
            <div class="calendar-header">
                <button id="btnPrev"><i class="fas fa-chevron-left"></i></button>
                <h2 id="fechaActual"></h2>
                <button id="btnNext"><i class="fas fa-chevron-right"></i></button>
                <button id="btnHoy" class="btn-hoy"><i class="fas fa-calendar-day"></i> Hoy</button>
            </div>

            <div id="vistaMes" class="vista activa">
                <div class="calendar-grid" id="calendarioGrid"></div>
            </div>

            <div id="vistaSemana" class="vista">
                <div class="semana-view" id="semanaGrid"></div>
            </div>

            <div id="vistaDia" class="vista">
                <div class="dia-view" id="diaGrid"></div>
            </div>
        </main>
    </div>

    <div id="modalEvento" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitulo">Nuevo evento</h3>
            <form id="eventoForm">
                <input type="hidden" id="eventoId">
                <input type="text" id="eventoTitulo" placeholder="Título del evento" required>
                <textarea id="eventoDescripcion" placeholder="Descripción"></textarea>
                <input type="date" id="eventoFecha" required>
                <input type="time" id="eventoHora" required>
                <select id="eventoTipo">
                    <option value="trabajo">💼 Trabajo</option>
                    <option value="personal">🏠 Personal</option>
                    <option value="reunion">👥 Reunión</option>
                    <option value="recordatorio">⏰ Recordatorio</option>
                </select>
                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Guardar</button>
                    <button type="button" id="btnEliminarEvento" class="btn-delete">Eliminar</button>
                </div>
            </form>
            <div class="modal-eventos-dia" id="modalEventosDia">
                <div class="modal-divider">
                    <span>📅 Eventos de este día</span>
                </div>
                <div id="listaEventosDia" class="lista-eventos-dia">
                    <div class="sin-eventos-modal">📭 No hay eventos programados para este día</div>
                </div>
            </div>
        </div>
    </div>

    <div id="notificacion" class="notificacion"></div>

    <script src="script.js"></script>
</body>

</html>
